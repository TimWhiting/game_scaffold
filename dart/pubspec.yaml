name: game_scaffold_dart
description: A scaffold for game projects, taking care of server implementation and some general events
version: 0.2.0+7
homepage: https://github.com/TimWhiting/game_scaffold

environment:
  sdk: ">=2.10.0 <3.0.0"

dependencies:
  riverpod: ^0.12.1
  freezed_annotation: ">=0.12.0 < 0.13.1"
  socket_io: ^0.9.4
  json_annotation: ">=3.1.1 < 4.1.0"
  stream: ^2.6.0
  logging: ">=0.11.4 < 1.1.0"
  socket_io_client: ^0.9.12
  enum_to_string: ">=1.0.14 < 2.1.0"
  fast_immutable_collections: ^2.0.0-nullsafety.2

dev_dependencies:
  json_serializable_fic: any
  freezed: any
  build_runner: any
  test: any
  dartdoc: any
  game_scaffold_games: any

